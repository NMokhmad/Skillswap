<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Profil</title>
    <link rel="stylesheet" href="../public/css/reset.css">
    <link rel="stylesheet" href="../public/css/profil_privé.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
</head>
<body>
    <header>

        <div class="skill_title">
            <h1 class="aventure">SkillSwap, votre aventure d'apprentissage commence ici</h1>
        </div>
        
        <div class="div_menu">
            <img src="../public/img/icons/icons8-menu-50.png" alt="logo menu burger" class="menu">
        </div>
        
        <nav class="menu_links">
            <a href="#" class="link">Inscription</a>
            <a href="#" class="link">Connexion</a>
            <button class="button_theme">Thème</button>
        </nav>

        <div class="search_div">

            <div class="searchbar">
                <input type="text" placeholder="Rechercher une compétence, un profil..." class="input_search">
            </div>

            <nav class="nav_icons">
                <a href=""><img src="../public/img/icons/entreprise.png" alt="icon négociation" class="icon"></a>
                <a href=""><img src="../public/img/icons/espagnol.png" alt="icon espagnol" class="icon"></a>
                <a href=""><img src="../public/img/icons/la-photographie.png" alt="icon appareil photo" class="icon"></a>
                <a href=""><img src="../public/img/icons/love-and-romance.png" alt="icon coeur" class="icon"></a>
                <a href=""><img src="../public/img/icons/motivation.png" alt="icon motivation" class="icon"></a>
            </nav>
        </div>
</header>

<main>
    <div class="container_informations">

        <section class="section_profil">

            <img src="../public/img/pexels-3motional-studio-407102-1081685.jpg" alt="photo de profil" class="pp">
            <h2 class="name_profil">Nom Prénom</h2>
            <p>Note</p>
            <div class="container_buttons">
                <button  class="button button_follow">Suivre</button>
                <button class="button button_contact">Contacter</button>
            </div>
    
        </section>

        <div class="container_skills">
            <h2 class="title_skills">Compétences et intérêts</h2>
            <ul>
                <li class="tag">Voyages</li>
                <li class="tag">Cuisine</li>
                <li class="tag">Piano</li>
                <li class="tag">Développement Web</li>
                <li class="tag">Mathématiques</li>
            </ul>
        </div>


    </div>
    

</main>

<footer>

    <div class="div_footer_links">
        <a href="#" class="footer_link">Mentions légales</a>
        <a href="#" class="footer_link">FAQ</a>
        <a href="#" class="footer_link">Support</a>
    </div>

    <div class="footer_reseaux">
        <img src="../public/img/icons/facebook.png" alt="logo facebook" class="logo_reseaux">
        <img src="../public/img/icons/instagram.png" alt="logo instagram" class="logo_reseaux">
        <img src="../public/img/icons/linkedin.png" alt="logo linkedin" class="logo_reseaux">
        <img src="../public/img/icons/twitter.png" alt="logo twitter" class="logo_reseaux">
    </div>

</footer>

</body>
</html>
