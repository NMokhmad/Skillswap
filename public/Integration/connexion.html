<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Connexion</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/connexion.css">

</head>

<body>

    <header>

            <div class="skill_title">
                <h1 class="aventure">SkillSwap, votre aventure d'apprentissage commence ici</h1>
            </div>
            
            <div class="div_menu">
                <img src="./images/icons8-menu-50.png" alt="logo menu burger" class="menu">
            </div>
            

            <nav class="menu_links">
                <a href="" class="link">Connexion</a>
                <a href="" class="link">Inscription</a>
                <button class="button_theme">Thème</button>
            </nav>

    </header>

    <main>
        <div class="connexion">

            <h2 class="title_connexion">Connexion</h2>

            <form action="" class="form">
                   

                    <div class="div_form">
                        <label for="email">Email</label>
                        <input type="email" class="form_input">
                    </div>

                    <div class="div_form">
                        <label for="password">Mot de passe</label>
                        <input type="password" class="form_input" >
                    </div>

        
            </form>
                <button type="submit" class="form_button_submit">Me connecter</button>
        </div>
    </main>

    <footer>

        <div class="div_footer_links">
            <a href="" class="footer_link">Mentions légales</a>
            <a href="" class="footer_link">FAQ</a>
            <a href="" class="footer_link">Support</a>
        </div>

        <div class="footer_reseaux">
            <img src="./images/facebook.png" alt="logo facebook" class="logo_reseaux">
            <img src="./images/instagram.png" alt="logo instagram" class="logo_reseaux">
            <img src="./images/linkedin.png" alt="logo linkedin" class="logo_reseaux">
            <img src="./images/twitter.png" alt="logo twitter" class="logo_reseaux">
        </div>

    </footer>

</body>
</html>
